plugins {
    id 'java'
    id 'org.jetbrains.intellij' version '1.9.0'
}

group 'org.example'
version '1.6-SNAPSHOT'

repositories {
    mavenCentral()
}

intellij {
    version.set("2022.3")
    downloadSources.set(true)
    updateSinceUntilBuild.set(true)
}

